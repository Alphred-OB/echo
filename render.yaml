services:
  - type: web
    name: echo-auth
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz

    envVars:
      - key: NODE_ENV
        value: production
      # node:sqlite is built in from Node 22.5 — this pins the runtime version.
      - key: NODE_VERSION
        value: 22.12.0

    # ── Uncomment this block if you upgrade to a paid plan ──────────────
    # disk:
    #   name: echo-data
    #   mountPath: /var/data
    #   sizeGB: 1
    # Then add this env var:
    #   - key: ECHO_DB
    #     value: /var/data/echo.db
    # ────────────────────────────────────────────────────────────────────
